<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #fff;
        /* タップでのスクロール・ズーム・選択を抑止して弾幕操作に集中させる */
        overflow: hidden;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
      }
      canvas {
        display: block;
        margin: 0 auto;
        /* 最大512px。画面がそれより狭ければ画面幅いっぱい(100vw)に。
           ebitenがcanvasのサイズをインラインstyleで直接指定するため、
           こちらのCSSを勝たせるには !important が必要。 */
        width: 100vw !important;
        max-width: 512px !important;
        height: auto !important;
      }
    </style>
    <script src="wasm_exec.js"></script>
    <script type="module">
      const go = new Go();
      const wasm = new URL("west.wasm", import.meta.url);

      const { instance } = await WebAssembly.instantiateStreaming(
        fetch(wasm),
        go.importObject,
      );
      go.run(instance);
    </script>
  </head>
  <body></body>
</html>
