<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script src="wasm_exec.js"></script>
    <script type="module">
      const go = new Go();
      const wasm = new URL("west.wasm", import.meta.url);

      const { instance } = await WebAssembly.instantiateStreaming(
        fetch(wasm),
        go.importObject,
      );
      go.run(instance);
    </script>
  </head>
  <body></body>
</html>
