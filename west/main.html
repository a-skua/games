<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #fff;
        overflow: hidden;
      }
      iframe {
        display: block;
        margin: 0 auto;
        border: none;
        /* 最大512px。画面がそれより狭ければ画面幅いっぱい(100vw)に。 */
        width: 100vw;
        max-width: 512px;
        /* 縦幅も同様に最大512pxで頭打ちにし、それより狭ければ画面幅基準(100vw)に。 */
        height: 100vw;
        max-height: 512px;
      }
    </style>
  </head>
  <body>
    <iframe src="game.html"></iframe>
  </body>
</html>
